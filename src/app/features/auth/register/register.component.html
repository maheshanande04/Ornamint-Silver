<div class="auth-container">
  <!-- Left Panel - Dark Informational Section -->
  <div class="auth-left-panel">
    <h1 class="auth-title">Join The Network</h1>
    <div class="auth-divider"></div>
    <p class="auth-subtitle">Institutional Physical Arbitrage System</p>
    <p class="auth-features">Fully Asset Backed | Secure | Compliant</p>
  </div>

  <!-- Right Panel - Frosted Glass Registration Form -->
  <div class="auth-right-panel">
    <div class="auth-form-container">
      <!-- Brand/Logo -->
      <div class="auth-brand">
        <div class="auth-logo">
          <i data-lucide="gem" class="w-5 h-5 text-white"></i>
        </div>
        <span class="auth-brand-name">Ornamint</span>
      </div>

      <div class="auth-form-divider"></div>

      <!-- Form Title -->
      <h2 class="auth-form-title">Create Account</h2>

      <!-- Registration Form -->
      <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
        <!-- Email Field -->
        <div class="auth-form-group">
          <label class="auth-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="auth-input"
            placeholder="Email Address"
            [(ngModel)]="registerData.email"
            required
            email
            #emailInput="ngModel"
          />
          <div *ngIf="emailInput.invalid && emailInput.touched" class="auth-error">
            Please enter a valid email address
          </div>
        </div>

        <!-- Password Field -->
        <div class="auth-form-group">
          <label class="auth-label" for="password">Password</label>
          <div class="auth-password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              class="auth-input"
              placeholder="Password"
              [(ngModel)]="registerData.password"
              required
              minlength="8"
              #passwordInput="ngModel"
            />
            <button
              type="button"
              class="auth-password-toggle"
              (click)="togglePasswordVisibility()"
              aria-label="Toggle password visibility"
            >
              <i [attr.data-lucide]="showPassword ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
            </button>
          </div>
          <div *ngIf="passwordInput.invalid && passwordInput.touched" class="auth-error">
            Password must be at least 8 characters
          </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="auth-form-group">
          <label class="auth-label" for="confirmPassword">Confirm Password</label>
          <div class="auth-password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              name="confirmPassword"
              class="auth-input"
              placeholder="Confirm Password"
              [(ngModel)]="registerData.confirmPassword"
              required
              #confirmPasswordInput="ngModel"
            />
            <button
              type="button"
              class="auth-password-toggle"
              (click)="toggleConfirmPasswordVisibility()"
              aria-label="Toggle password visibility"
            >
              <i [attr.data-lucide]="showConfirmPassword ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
            </button>
          </div>
          <div *ngIf="registerData.password !== registerData.confirmPassword && confirmPasswordInput.touched" class="auth-error">
            Passwords do not match
          </div>
        </div>

        <!-- Terms Checkbox -->
        <div class="auth-checkbox-group">
          <input
            type="checkbox"
            id="terms"
            class="auth-checkbox"
            [(ngModel)]="registerData.acceptTerms"
            name="acceptTerms"
            required
            #termsInput="ngModel"
          />
          <label for="terms" class="auth-checkbox-label">
            I agree to the Terms & Conditions and Privacy Policy
          </label>
        </div>
        <div *ngIf="termsInput.invalid && termsInput.touched" class="auth-error">
          You must accept the terms and conditions
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="auth-submit-btn"
          [disabled]="registerForm.invalid || isLoading || registerData.password !== registerData.confirmPassword"
        >
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading">Creating Account...</span>
        </button>

        <!-- Action Links -->
        <div class="auth-actions">
          <span>Already have an account?</span>
          <a routerLink="/auth/login" class="auth-link">Sign In</a>
        </div>
      </form>
    </div>
  </div>
</div>
