<div class="income-history-section">
  <h3 *ngIf="showTitle" class="section-title">Income History</h3>
  <div class="income-tabs">
    <button *ngFor="let tab of incomeTabs"
      class="income-tab"
      [class.active]="activeTab === tab.id"
      (click)="setActiveTab(tab.id)">
      {{ tab.label }}
    </button>
  </div>
  <div class="table-container">
    <table class="history-table" *ngIf="incomeHistory.length > 0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Reference</th>
          <th>Description</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of incomeHistory">
          <td>{{ row.date }}</td>
          <td>{{ row.reference }}</td>
          <td>{{ row.description }}</td>
          <td>{{ row.amount }}</td>
          <td>
            <span class="status-badge" [ngClass]="'status-' + (row.status || 'pending').toLowerCase()">
              {{ row.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="incomeHistory.length === 0" class="no-data-state">
      <table class="history-table history-table-head-only">
        <thead>
          <tr>
            <th>Date</th>
            <th>Reference</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
      </table>
      <div class="no-data-content">
        <div class="no-data-icon">
          <i data-lucide="file-question"></i>
        </div>
        <p class="no-data-title">SORRY</p>
        <p class="no-data-message">We Haven't Found Any Data</p>
      </div>
    </div>
  </div>
</div>
